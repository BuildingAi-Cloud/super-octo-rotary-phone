# Example GitHub Actions workflow for CI/CD
name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8
      - name: Install dependencies
        run: pnpm install
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build
      - name: Test
        run: pnpm test || true
      - name: Docker build
        run: docker build -t my-app .
      - name: Build Android (Capacitor)
        run: |
          npx cap sync android
          npx cap copy android
      - name: Build iOS (Capacitor)
        run: |
          npx cap sync ios
          npx cap copy ios
      # Uncomment after Tauri CLI is installed and configured
      #- name: Build Linux (Tauri)
      #  run: tauri build
      - name: Update API Reference
        run: pnpm run update-api-reference
      - name: Bump minor version and tag release
        run: |
          npm version minor -m "chore: bump minor version to %s [skip ci]"
          git push --follow-tags
