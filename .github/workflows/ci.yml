# Example GitHub Actions workflow for CI/CD
name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9.15.0
      - name: Install dependencies
        run: pnpm install
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build
      - name: Test
        run: pnpm test || true
      - name: Docker build
        run: docker build -t my-app .
      - name: Build Android (Capacitor)
        if: ${{ hashFiles('android/**') != '' }}
        run: |
          pnpm exec cap sync android
          pnpm exec cap copy android
      - name: Build iOS (Capacitor)
        if: ${{ hashFiles('ios/**') != '' }}
        run: |
          pnpm exec cap sync ios
          pnpm exec cap copy ios
      # Uncomment after Tauri CLI is installed and configured
      #- name: Build Linux (Tauri)
      #  run: tauri build
      - name: Update API Reference
        run: pnpm run update-api-reference
      - name: Configure git identity for release
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Bump minor version and tag release
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        run: |
          npm version minor -m "chore: bump minor version to %s [skip ci]"
          git push --follow-tags
