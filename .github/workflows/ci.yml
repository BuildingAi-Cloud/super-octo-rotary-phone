name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.0

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Update API Reference
        run: pnpm run update-api-reference

      # Docker image build — only runs on master pushes, not on PRs
      - name: Set up Docker Buildx
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/setup-buildx-action@v3

      - name: Docker build
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: my-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Capacitor — only when native platform directories exist
      - name: Build Android (Capacitor)
        if: hashFiles('android/**') != ''
        run: |
          pnpm exec cap sync android
          pnpm exec cap copy android

      - name: Build iOS (Capacitor)
        if: hashFiles('ios/**') != ''
        run: |
          pnpm exec cap sync ios
          pnpm exec cap copy ios

      # Release steps — only on direct master pushes, not PRs
      - name: Configure git identity for release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit generated API reference
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          if ! git diff --quiet -- docs/api-reference.md; then
            git add docs/api-reference.md
            git commit -m "docs(api): update generated api reference [skip ci]"
          fi

      - name: Bump minor version and tag release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          npm version minor -m "chore: bump minor version to %s [skip ci]"
          git push --follow-tags
