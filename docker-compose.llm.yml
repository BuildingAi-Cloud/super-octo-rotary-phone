version: '3.8'
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - LLM_ENDPOINT=http://ollama:11434
    depends_on:
      - ollama
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
volumes:
  ollama-data:
